            -ms-box-pack: center;
            -ms-box-align: center;

            display: box;
            box-orient: horizontal;
            box-pack: center;
            box-align: center;
        }

        .cateselect {
            background: #0a6ebd;
        }

        .div_tool {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: auto;
            background-color: rgba(39, 53, 95, 0.65);
            box-shadow: 0 1px 5px 0 rgba(0, 0, 0, 0.25);
            border-radius: 0.1rem .1rem 0 0;
            font-size: .25rem;
            padding: .8rem 0;
        }

        .div_tool ul {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .div_tool ul li {
            overflow: hidden;
            width: 2rem;
            height: 2rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-radius: .08rem;
            cursor: pointer;
            float: left;
            background-color: rgba(142, 142, 142, 0.1);
            box-shadow: 0 4px 5px 0 rgba(0, 0, 0, 0.14), 0 1px 10px 0 rgba(0, 0, 0, 0.12), 0 2px 4px -1px rgba(0, 0, 0, 0.4);
        }

        .tools-container {
            position: absolute;
            top: 0;
            right: 50%;
            transform: translateX(50%);
            -moz-transform: translateX(50%);
            -webkit-transform: translateX(50%);
            -o-transform: translateX(50%);
            width: 30.9rem;
            height: auto;
            background-color: rgba(20, 33, 53, 0.65);
            border-radius: .08rem;
            padding: .05rem;
            display: none;
        }

        .tools-container .content {
            display: flex;
            justify-content: flex-start;
        }

        .tools-container .content .tool {
            width: 2rem;
            height: 2rem;
            padding: .5rem;
            background-color: rgba(20, 33, 53, 0.65);
            box-shadow: 0 1px 5px 0 rgba(0, 0, 0, 0.25);
            border: 1px rgba(255, 255, 255, 0) dashed;
            border-radius: .1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .tooltip {
            position: relative;
            display: inline-block;
            border-bottom: 1px solid grey;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 120px;
            font-size: 12px;
            background-color: rgba(39, 53, 95, 0.65);
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px 2px;

            /* 定位工具提示 */
            position: absolute;
            z-index: 1;
            top: 100%;
            left: 50%;
            margin-left: -60px;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
        }
    </style>

    <script>
        var scene, camera, pointLight, renderer, controls, controlsd;
        var axes, gridHelper, group, stlfiles;
        var raycaster, mouse, outlineMesh, objbox, clipx, clipy, clipz;
        var idNavHtml = "";
        var AllOpacity = 0;
        var stlfileoid = 0;

        var meshobjects = [];
        var stloldfiles = [];
        var totalprogress = [];
        var meshloadindex = [];
        var meshpos = [];
        var meshloadID = [];
        var enableSelection = false;
        var enableDrag = false;
        var enableRender = false;
        var renderTimeout;
        var clippingflag = false;
        var clickFlag = false;
        var start = {
            x: 0,
            y: 0
        };
        var end = {
            x: 0,
            y: 0
        };


        var objgroup = new THREE.Group();

        ClearColor = 0xffffff;
        ClearAlpha = 0;
        SelectPart = false;
        //测量
        DistancePoint = false;
        AnglePoint = false;
        LabelPoint = false;
        ModelClip = false;
        MeasureType = "none";
        clickedPoints = [];
        drawPoints = new Map();
        drawLines = new Map();
        drawTexts = new Map();
        measureObj = new Map();
        labelInput = '';
        needDeleteTag = new Map()
        boundingBoxTotal = []
        relatingModelArr = []
        RotateLock = 0;
        RotatePlay = false;

        iRaycasterClick = 0;
        openMeshLayer = 0;
        var clipPlanes = [
            new THREE.Plane(new THREE.Vector3(1, 0, 0), 0),
            new THREE.Plane(new THREE.Vector3(0, 1, 0), 0),
            new THREE.Plane(new THREE.Vector3(0, 0, -1), 0)
        ];

        var cateselectid = [];
        var modelOperationList = [];
        var mainCateId = 1;
        let userId;
        let operationType = GetQueryString('operation');
        let patientName = '';

        $.post("/?s=App.Liver.GetModelList", {
            order_no: GetQueryString("order_no")
        }, function (data, status) {
            stlfiles = data.data.modelList;
            orderInfo = data.data.orderInfo;
            if (orderInfo["status"] == 0) {
                return;
            }
            userId = orderInfo['user_id'];
            let items = [];
            let datelist = {};
            for (var p in stlfiles) {
                let element = stlfiles[p];
                if (!datelist[element.cateid]) {
                    items.push({
                        cateid: element.cateid,
                        catename: element.catename
                    })
                    datelist[element.cateid] = element;
                }
            }
            datelist = {};
            var catehtml = '';
            for (var m in items) {
                let cateId = items[m].cateid;
                cateselectid.push(cateId);
                if (m == 0) {
                    mainCateId = cateId;
                }
                catehtml += '<li>';
                catehtml += '<span data-cate="' + cateId + '" class="mfb-component__button--child catecenter cateselect">';
                catehtml += items[m].catename;
                catehtml += '</span>';
                catehtml += '</li>';
            }
            if(userId == 5){
                
            } else {
                const uid = orderInfo?.attachment?.dicom_tags?.uid;
                if(uid){
                    catehtml += '<li>';
                    catehtml += '<span data-cate="CT" class="mfb-component__button--child catecenter">';
                    catehtml += '云胶片';
                    catehtml += '</span>';
                    catehtml += '</li>';
                }
            }
            $('.catelist').html(catehtml);
            
            let headerText = orderInfo['patient_name'];
            patientName = orderInfo['patient_name'];
            if (userId == 5 || userId == 8) {//子账号sub103和sub106
                ClearAlpha = 0.75;
                headerText = "医院:" + orderInfo['hospital']
                    + "<br/>科室:" + orderInfo['department']
                    + "<br/>患者:" + orderInfo['patient_name'];
            }
            if (operationType == 'report') {
                $('#loading').hide();
                $('#reportLoading').show();
            } else {
                $('#reportLoading').hide();
            }
            if (orderInfo['note'].trim() == "") {
                $('.userinfo').html('<span class="tooltip">' + headerText + '</span>');
            } else {
                $('.userinfo').html('<span class="tooltip">' + headerText + '<span class="tooltiptext">' + orderInfo['note'] + '</span></span>');
            }
            if (userId == 5 || userId == 8) {
                $('.tooltip').css('color', 'grey');
            }
            $(".catecenter").click(function (e) {
                let cateVal = $(this).attr('data-cate');
                if ($(this).hasClass("cateselect")) {
                    $(this).removeClass("cateselect");
                    contains(cateselectid, parseInt(cateVal));
                    $('.stlfiles').children().filter('[data-cate="' + cateVal + '"]').hide();
                } else {
                    if(cateVal == 'CT'){
                        const uid = orderInfo?.attachment?.dicom_tags?.uid;
                        $('#dicomIframe').attr('src', '//s.hzyzrz123456.com.cn/dicom-viewer/?StudyUID=' + uid);
                        $('#dicomIframe').show();
                    }else{
                        $(this).addClass("cateselect");
                        cateselectid.push(parseInt(cateVal));
                        $('.stlfiles').children().filter('[data-cate="' + cateVal + '"]').show();
                    }
                }
            });
            window.addEventListener('message', function (event) {
                if (event.data.type === 'dicom-viewer-back') {
                    $('#dicomIframe').hide();
                }
            }, false);
            $(".popup button").click(function (e) {
                $(".popup").hide();
            })
            threeStart();
        });

        function threeStart() {
            initThree();
            initObject();
            initControl();
            initRaycaster();
            animate();
            $("#stlfiles").on("touchstart", function () {
                controls.enabled = false;
            });
            $("#stlfiles").on("touchmove", function () {
                controls.enabled = false;
            });
            $("#stlfiles").on("touchend", function () {
                controls.enabled = true;
            });
            $(".tanchu").on("touchstart", function () {
                controls.enabled = false;
            });
            $(".tanchu").on("touchmove", function () {
                controls.enabled = false;
                enableRender = true;
            });
            $(".tanchu").on("touchend", function () {
                controls.enabled = true;
                enableRender = false;
            });
            $(".tanchu").on("mousemove", function () {
                enableRender = true;
            });
            $(".tanchu").on("mousedown", function () {
                enableRender = false;
            });
            initstlfiles();
            if (window.screen.width < 500) {
                $('.div_stlfiles').offset({ left: 0, top: $('body').height() - $('.div_tool').height() - $('.div_stlfiles').height() - 30 });
                $('.tools-container').css("transform", " translateX(50%) scaleX(0.88)");
            } else {
                $('.div_stlfiles').offset({ left: 0, top: $('body').height() - $('.div_tool').height() - $('.div_stlfiles').height() - 30 });
            }
            $('.tanchu').offset({ left: 0, top: $('.tools-container').height() });
        }

        function GetQueryString(name) {
            var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
            var r = window.location.search.substr(1).match(reg);
            if (r != null) return decodeURIComponent(r[2]);
            return null;
        }

        function scrollHorizontally(e) {
            e.preventDefault();
            e.currentTarget.scrollLeft += e.deltaY;
        }

        function thisshow() {
            $('.stlfiles').children().show()
            $('.color-display').colpick({
                colorScheme: 'light',
                layout: 'hex',
                color: 'ff0000',
                submitText: '确定',
                onShow: function (v) {
                    if (userId == 5) return false;
                },
                onChange: function (hsb, hex, rgb, el, bySetColor) {
                    $(el).css('background-color', '#' + hex);
                },
                onSubmit: function (hsb, hex, rgb, el) {
                    $(el).css('background-color', '#' + hex);
                    $(el).colpickHide();
                    setColor($(el).parents(".stlfile").attr("objectnum") * 1, '#' + hex);
                }
            });
            if (operationType == 'report') {
                //开启报告生成模式
                onNeedGenerateReport();
            }
        }
    </script>
