<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑记录 — 医学数据管理系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar" id="sidebar-mount" data-page="index"></aside>

  <div class="main">
    <header class="topbar">
      <a href="record-detail.html" class="btn btn-ghost btn-icon btn-sm" style="margin-right:4px">
        <i class="bi bi-arrow-left"></i>
      </a>
      <span class="topbar-breadcrumb">
        <a href="index.html" style="color:#9ca3af">记录列表</a>
        &nbsp;/&nbsp;
        <a href="record-detail.html" style="color:#9ca3af">MR-2026-000012</a>
        &nbsp;/&nbsp;<span>编辑</span>
      </span>
    </header>

    <div class="content">

      <!-- Flash -->
      <div class="flash success" id="flash" style="display:none">
        <i class="bi bi-check-circle-fill"></i>
        <span>记录信息已更新</span>
      </div>

      <!-- 验证提示 -->
      <div class="validation-banner" id="val-banner">
        <i class="bi bi-exclamation-circle-fill" style="font-size:16px;flex-shrink:0"></i>
        <div>
          <strong>请修正以下必填项：</strong>
          <ul id="val-list"></ul>
        </div>
      </div>

      <form onsubmit="handleSubmit(event)" novalidate>

        <div class="card" style="padding:22px; margin-bottom:16px">
          <div class="section-title">
            修改基本信息 &nbsp;
            <span style="text-transform:none; letter-spacing:0; font-weight:400; color:#6b7280">
              — 编号 <span class="record-code" style="font-size:11px">MR-2026-000012</span>（不可修改）
            </span>
          </div>

          <div style="display:grid; grid-template-columns:1fr 1fr; gap:18px">

            <div class="form-group" id="fg-date" style="margin-bottom:0">
              <label class="form-label">检查日期 <span class="required">*</span></label>
              <div class="date-group">
                <select class="select" id="sel-year">
                  <option selected>2026</option><option>2025</option><option>2024</option>
                </select>
                <span class="date-sep">年</span>
                <select class="select" id="sel-month" style="max-width:68px">
                  <option selected>2</option>
                  <option>3</option><option>4</option>
                </select>
                <span class="date-sep">月</span>
                <select class="select" id="sel-day" style="max-width:68px">
                  <option selected>25</option>
                </select>
                <span class="date-sep">日</span>
              </div>
              <p class="form-error hidden" id="err-date"><i class="bi bi-exclamation-circle"></i> 请选择完整的日期</p>
            </div>

            <div class="form-group" id="fg-hospital" style="margin-bottom:0">
              <label class="form-label">所属医院 <span class="required">*</span></label>
              <select class="select" id="sel-hospital">
                <option>北京协和医院</option>
                <option>上海瑞金医院</option>
                <option selected>广州中山医院</option>
              </select>
              <p class="form-error hidden" id="err-hospital"><i class="bi bi-exclamation-circle"></i> 请选择所属医院</p>
            </div>

            <div class="form-group" id="fg-part" style="margin-bottom:0">
              <label class="form-label">检查部位 <span class="required">*</span></label>
              <select class="select" id="sel-part">
                <option selected>膝关节 (knee)</option>
                <option>手腕 (hand)</option>
                <option>踝关节 (ankle)</option>
                <option>肘关节 (elbow)</option>
                <option>骨盆 (pelvis)</option>
                <option>肩胛骨 (scapula)</option>
              </select>
              <p class="form-error hidden" id="err-part"><i class="bi bi-exclamation-circle"></i> 请选择检查部位</p>
            </div>

            <div class="form-group" style="grid-column:1/-1; margin-bottom:0">
              <label class="form-label">病例描述</label>
              <textarea class="textarea" rows="4"
                placeholder="请输入疾病的具体症状、诊断信息、手术记录等…">半月板损伤术前影像，包含MRI序列，患者左膝关节，建议关节镜手术评估。</textarea>
              <p class="form-hint">可输入疾病症状、诊断结论、手术方案等（非必填）</p>
            </div>

          </div>
        </div>

        <!-- 提示：文件管理在详情页 -->
        <div style="display:flex; align-items:center; gap:8px; padding:12px 16px;
                    background:#fffbeb; border:1px solid #fde68a; border-radius:9px;
                    margin-bottom:20px; font-size:12.5px; color:#92400e">
          <i class="bi bi-info-circle"></i>
          文件的上传与删除请在<a href="record-detail.html" style="color:#d97706; font-weight:600; margin:0 3px">记录详情页</a>操作。
        </div>

        <div style="display:flex; justify-content:flex-end; gap:10px">
          <a href="record-detail.html" class="btn btn-default"><i class="bi bi-x-lg"></i> 取消</a>
          <button type="submit" class="btn btn-primary" style="padding:7px 24px">
            <i class="bi bi-check-lg"></i> 保存修改
          </button>
        </div>

      </form>
    </div><!-- /content -->
  </div><!-- /main -->
</div><!-- /layout -->

<script src="nav.js"></script>
<script>
  function validateForm() {
    const errs = [];
    ['fg-date','fg-hospital','fg-part'].forEach(id => document.getElementById(id).classList.remove('has-error'));
    ['err-date','err-hospital','err-part'].forEach(id => document.getElementById(id).classList.add('hidden'));
    // All pre-filled in edit mode, but still validate empty values defensively
    return errs;
  }

  function handleSubmit(e) {
    e.preventDefault();
    const errs = validateForm();
    const banner = document.getElementById('val-banner');
    if (errs.length) {
      document.getElementById('val-list').innerHTML = errs.map(m => `<li>${m}</li>`).join('');
      banner.classList.add('show');
      return;
    }
    banner.classList.remove('show');
    const flash = document.getElementById('flash');
    flash.style.display = 'flex';
    setTimeout(() => {
      flash.style.display = 'none';
      location.href = 'record-detail.html';
    }, 1000);
  }
</script>
</body>
</html>
