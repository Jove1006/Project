<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医院管理 — 医学数据管理系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar" id="sidebar-mount" data-page="hospitals"></aside>

  <div class="main">
    <header class="topbar">
      <span class="topbar-title">医院管理</span>
      <button class="btn btn-primary btn-sm" onclick="openModal()">
        <i class="bi bi-plus-lg"></i> 新增医院
      </button>
    </header>

    <div class="content">

      <!-- Flash -->
      <div class="flash success" id="flash" style="display:none">
        <i class="bi bi-check-circle-fill"></i>
        <span id="flash-text">操作成功</span>
      </div>

      <div class="card" style="overflow:hidden">
        <table class="data-table">
          <thead>
            <tr>
              <th>医院名称</th>
              <th>简称</th>
              <th>排序</th>
              <th>状态</th>
              <th>关联记录</th>
              <th width="90">操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td style="font-weight:500">广州中山医院</td>
              <td style="color:#9ca3af">中山</td>
              <td>1</td>
              <td><span class="badge badge-success">启用</span></td>
              <td>22</td>
              <td>
                <div class="btn-group">
                  <button class="btn btn-ghost btn-icon btn-sm" title="编辑" onclick="openEditModal('广州中山医院','中山',1)">
                    <i class="bi bi-pencil"></i>
                  </button>
                  <!-- 有关联记录，禁止删除 -->
                  <button class="btn btn-ghost btn-icon btn-sm" style="opacity:.3; cursor:not-allowed" title="有关联记录，不可删除" disabled>
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
            <tr>
              <td style="font-weight:500">北京协和医院</td>
              <td style="color:#9ca3af">协和</td>
              <td>2</td>
              <td><span class="badge badge-success">启用</span></td>
              <td>15</td>
              <td>
                <div class="btn-group">
                  <button class="btn btn-ghost btn-icon btn-sm" onclick="openEditModal('北京协和医院','协和',2)"><i class="bi bi-pencil"></i></button>
                  <button class="btn btn-ghost btn-icon btn-sm" style="opacity:.3; cursor:not-allowed" disabled><i class="bi bi-trash"></i></button>
                </div>
              </td>
            </tr>
            <tr>
              <td style="font-weight:500">上海瑞金医院</td>
              <td style="color:#9ca3af">瑞金</td>
              <td>3</td>
              <td><span class="badge badge-success">启用</span></td>
              <td>10</td>
              <td>
                <div class="btn-group">
                  <button class="btn btn-ghost btn-icon btn-sm" onclick="openEditModal('上海瑞金医院','瑞金',3)"><i class="bi bi-pencil"></i></button>
                  <button class="btn btn-ghost btn-icon btn-sm" style="opacity:.3; cursor:not-allowed" disabled><i class="bi bi-trash"></i></button>
                </div>
              </td>
            </tr>
            <tr>
              <td style="font-weight:500; color:#9ca3af">测试医院</td>
              <td style="color:#d1d5db">—</td>
              <td style="color:#9ca3af">99</td>
              <td><span class="badge badge-secondary">停用</span></td>
              <td style="color:#d1d5db">0</td>
              <td>
                <div class="btn-group">
                  <button class="btn btn-ghost btn-icon btn-sm" onclick="openEditModal('测试医院','',99)"><i class="bi bi-pencil"></i></button>
                  <button class="btn btn-ghost btn-icon btn-sm" style="color:#ef4444"
                    onclick="confirmDeleteHospital('测试医院')"><i class="bi bi-trash"></i></button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <p style="font-size:12px; color:#9ca3af; margin-top:12px">
        <i class="bi bi-info-circle"></i>
        &nbsp;有关联医学记录的医院不允许删除。如需停用，请将状态改为"停用"。
      </p>

    </div><!-- /content -->
  </div><!-- /main -->
</div><!-- /layout -->

<!-- 新增医院 Modal -->
<div class="modal-overlay" id="modal-new">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">新增医院</span>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('modal-new')"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">医院全称 <span class="required">*</span></label>
        <input type="text" class="input" placeholder="例：北京协和医院" id="new-name">
      </div>
      <div class="form-group">
        <label class="form-label">简称</label>
        <input type="text" class="input" placeholder="例：协和" id="new-short">
        <p class="form-hint">用于列表简短显示，可不填</p>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">排序权重</label>
        <input type="number" class="input" value="10" style="width:100px" id="new-sort">
        <p class="form-hint">数字越小越靠前</p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('modal-new')">取消</button>
      <button class="btn btn-primary" onclick="doCreate()">保存</button>
    </div>
  </div>
</div>

<!-- 编辑医院 Modal -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">编辑医院</span>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('modal-edit')"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">医院全称 <span class="required">*</span></label>
        <input type="text" class="input" id="edit-name">
      </div>
      <div class="form-group">
        <label class="form-label">简称</label>
        <input type="text" class="input" id="edit-short">
      </div>
      <div class="form-group">
        <label class="form-label">排序权重</label>
        <input type="number" class="input" style="width:100px" id="edit-sort">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">状态</label>
        <select class="select" style="width:120px">
          <option selected>启用</option>
          <option>停用</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('modal-edit')">取消</button>
      <button class="btn btn-primary" onclick="doSaveEdit()">保存修改</button>
    </div>
  </div>
</div>

<!-- 删除确认 Modal -->
<div class="modal-overlay" id="modal-delete">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">确认删除</span>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('modal-delete')"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <p style="margin:0; font-size:13.5px; color:#374151">
        确定要删除医院「<strong id="delete-target"></strong>」吗？
      </p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('modal-delete')">取消</button>
      <button class="btn btn-danger" onclick="doDelete()">确认删除</button>
    </div>
  </div>
</div>

<script src="nav.js"></script>
<script>
  function openModal() { document.getElementById('modal-new').classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function openEditModal(name, short, sort) {
    document.getElementById('edit-name').value = name;
    document.getElementById('edit-short').value = short;
    document.getElementById('edit-sort').value = sort;
    document.getElementById('modal-edit').classList.add('open');
  }

  function confirmDeleteHospital(name) {
    document.getElementById('delete-target').textContent = name;
    document.getElementById('modal-delete').classList.add('open');
  }

  function showFlash(msg) {
    const f = document.getElementById('flash');
    document.getElementById('flash-text').textContent = msg;
    f.style.display = 'flex';
    setTimeout(() => { f.style.display = 'none'; }, 3000);
  }

  function doCreate() {
    closeModal('modal-new');
    showFlash('医院新增成功');
  }

  function doSaveEdit() {
    closeModal('modal-edit');
    showFlash('医院信息已更新');
  }

  function doDelete() {
    closeModal('modal-delete');
    showFlash('医院已删除');
  }
</script>
</body>
</html>
