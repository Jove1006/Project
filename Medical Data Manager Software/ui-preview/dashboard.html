<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>统计看板 — 医学数据管理系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar" id="sidebar-mount" data-page="dashboard"></aside>

  <div class="main">
    <header class="topbar">
      <span class="topbar-title">统计看板</span>
      <span style="font-size:12px; color:#9ca3af">数据截至 2026-02-26</span>
    </header>

    <div class="content">

      <!-- 顶部统计卡片 -->
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-icon indigo"><i class="bi bi-file-earmark-medical"></i></div>
          <div>
            <div class="stat-value">47</div>
            <div class="stat-label">总记录数</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><i class="bi bi-paperclip"></i></div>
          <div>
            <div class="stat-value">183</div>
            <div class="stat-label">总文件数</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon sky"><i class="bi bi-hdd"></i></div>
          <div>
            <div class="stat-value">12.4 GB</div>
            <div class="stat-label">总存储量</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon amber"><i class="bi bi-building"></i></div>
          <div>
            <div class="stat-value">3</div>
            <div class="stat-label">合作医院</div>
          </div>
        </div>
      </div>

      <!-- 三栏图表 -->
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; margin-bottom:16px">

        <!-- 按医院 -->
        <div class="card" style="padding:20px">
          <div class="section-title" style="margin-bottom:16px">按医院分布</div>
          <div class="progress-row">
            <div class="progress-row-header">
              <span>广州中山医院</span><span>22 条</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" style="width:47%; background:#4f46e5"></div>
            </div>
          </div>
          <div class="progress-row">
            <div class="progress-row-header">
              <span>北京协和医院</span><span>15 条</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" style="width:32%; background:#818cf8"></div>
            </div>
          </div>
          <div class="progress-row">
            <div class="progress-row-header">
              <span>上海瑞金医院</span><span>10 条</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" style="width:21%; background:#c7d2fe"></div>
            </div>
          </div>
        </div>

        <!-- 按部位 -->
        <div class="card" style="padding:20px">
          <div class="section-title" style="margin-bottom:16px">按部位分布</div>
          <div class="progress-row">
            <div class="progress-row-header">
              <span>膝关节</span><span>18 条</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" style="width:38%; background:#0ea5e9"></div>
            </div>
          </div>
          <div class="progress-row">
            <div class="progress-row-header">
              <span>手腕</span><span>11 条</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" style="width:23%; background:#22c55e"></div>
            </div>
          </div>
          <div class="progress-row">
            <div class="progress-row-header">
              <span>踝关节</span><span>8 条</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" style="width:17%; background:#f59e0b"></div>
            </div>
          </div>
          <div class="progress-row">
            <div class="progress-row-header">
              <span>其他</span><span>10 条</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" style="width:21%; background:#e2e8f0"></div>
            </div>
          </div>
        </div>

        <!-- 文件类型 -->
        <div class="card" style="padding:20px">
          <div class="section-title" style="margin-bottom:16px">文件类型构成</div>
          <div class="progress-row">
            <div class="progress-row-header">
              <span><span class="badge badge-image">图像</span></span><span>94 个</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" style="width:51%; background:#2563eb"></div>
            </div>
          </div>
          <div class="progress-row">
            <div class="progress-row-header">
              <span><span class="badge badge-model">模型</span></span><span>45 个</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" style="width:25%; background:#16a34a"></div>
            </div>
          </div>
          <div class="progress-row">
            <div class="progress-row-header">
              <span><span class="badge badge-annot">标注</span></span><span>29 个</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" style="width:16%; background:#f59e0b"></div>
            </div>
          </div>
          <div class="progress-row">
            <div class="progress-row-header">
              <span><span class="badge badge-report">报告</span></span><span>15 个</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" style="width:8%; background:#9333ea"></div>
            </div>
          </div>
        </div>

      </div>

      <!-- 月度趋势（简单横向条形图） -->
      <div class="card" style="padding:20px">
        <div class="section-title" style="margin-bottom:16px">近 6 个月新增记录趋势</div>
        <div style="display:flex; gap:16px; align-items:flex-end; height:100px">
          <!-- 每月一列 -->
          <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:6px">
            <span style="font-size:11px; color:#9ca3af">3</span>
            <div style="width:100%; background:#eef2ff; border-radius:4px 4px 0 0; height:20%"></div>
            <span style="font-size:11px; color:#9ca3af">9月</span>
          </div>
          <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:6px">
            <span style="font-size:11px; color:#9ca3af">5</span>
            <div style="width:100%; background:#818cf8; border-radius:4px 4px 0 0; height:33%"></div>
            <span style="font-size:11px; color:#9ca3af">10月</span>
          </div>
          <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:6px">
            <span style="font-size:11px; color:#9ca3af">8</span>
            <div style="width:100%; background:#818cf8; border-radius:4px 4px 0 0; height:53%"></div>
            <span style="font-size:11px; color:#9ca3af">11月</span>
          </div>
          <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:6px">
            <span style="font-size:11px; color:#9ca3af">6</span>
            <div style="width:100%; background:#818cf8; border-radius:4px 4px 0 0; height:40%"></div>
            <span style="font-size:11px; color:#9ca3af">12月</span>
          </div>
          <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:6px">
            <span style="font-size:11px; color:#9ca3af">11</span>
            <div style="width:100%; background:#818cf8; border-radius:4px 4px 0 0; height:73%"></div>
            <span style="font-size:11px; color:#9ca3af">1月</span>
          </div>
          <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:6px">
            <span style="font-size:11px; color:#4f46e5; font-weight:700">15</span>
            <div style="width:100%; background:#4f46e5; border-radius:4px 4px 0 0; height:100%"></div>
            <span style="font-size:11px; color:#4f46e5; font-weight:600">2月</span>
          </div>
        </div>
      </div>

    </div><!-- /content -->
  </div><!-- /main -->
</div><!-- /layout -->

<script src="nav.js"></script>
</body>
</html>
