<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>STL 文件查看器</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(at center center, #fff 20%, #666f7a 100%);
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 5px;
            z-index: 100;
            max-width: 300px;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 18px;
            z-index: 200;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 5px;
            color: white;
            z-index: 100;
        }
        button {
            background: #0a6ebd;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #0858a0;
        }
        #modelList {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 5px;
            color: white;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 100;
            max-width: 250px;
        }
        .model-item {
            padding: 8px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            word-wrap: break-word;
        }
        .model-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .model-item.hidden {
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>STL 3D 查看器</h3>
        <p>鼠标左键：旋转</p>
        <p>鼠标右键：平移</p>
        <p>滚轮：缩放</p>
        <p id="modelCount">模型数量: 0</p>
    </div>
    
    <div id="loading">加载中...</div>
    
    <div id="controls">
        <button onclick="resetCamera()">重置视角</button>
        <button onclick="toggleAllModels()">显示/隐藏全部</button>
        <button onclick="toggleWireframe()">线框模式</button>
    </div>
    
    <div id="modelList"></div>

    <script src="static/webgln/js/dev/three.min.js"></script>
    <script src="static/webgln/js/dev/STLLoader.js"></script>
    <script src="static/webgln/js/dev/CustomTrackballControls.js"></script>
    
    <!-- 添加OrbitControls作为备份 -->
    <script>
        if (!THREE.OrbitControls) {
            // OrbitControls 简化实现
            THREE.OrbitControls = class OrbitControls extends THREE.EventDispatcher {
                constructor(camera, domElement) {
                    super();
                    this.camera = camera;
                    this.domElement = domElement;
                    this.enabled = true;
                    this.target = new THREE.Vector3();
                    this.minDistance = 0;
                    this.maxDistance = Infinity;
                    this.minZoom = 0;
                    this.maxZoom = Infinity;
                    this.autoRotate = false;
                    this.autoRotateSpeed = 2;
                    this.rotateSpeed = 0.005;
                    this.zoomSpeed = 0.1;
                    this.panSpeed = 0.5;
                    
                    const scope = this;
                    const STATE = { NONE: -1, ROTATE: 0, DOLLY: 1, PAN: 2, TOUCH_ROTATE: 3, TOUCH_DOLLY: 4, TOUCH_PAN: 5 };
                    let state = STATE.NONE;
                    
                    const EPS = 0.000001;
                    const position = camera.position;
                    const offset = new THREE.Vector3();
                    
                    const spherical = new THREE.Spherical();
                    const sphericalDelta = new THREE.Spherical();
                    let scale = 1;
                    
                    const panOffset = new THREE.Vector3();
                    const zoomChanged = false;
                    
                    const rotateStart = new THREE.Vector2();
                    const rotateEnd = new THREE.Vector2();
                    const rotateDelta = new THREE.Vector2();
                    
                    const panStart = new THREE.Vector2();
                    const panEnd = new THREE.Vector2();
                    const panDelta = new THREE.Vector2();
                    
                    const dollyStart = new THREE.Vector2();
                    const dollyEnd = new THREE.Vector2();
                    const dollyDelta = new THREE.Vector2();
                    
                    function update() {
                        offset.copy(position).sub(scope.target);
                        spherical.setFromVector3(offset);
                        spherical.theta -= rotateDelta.x;
                        spherical.phi -= rotateDelta.y;
                        spherical.theta = Math.max(-Math.PI, Math.min(Math.PI, spherical.theta));
                        spherical.phi = Math.max(EPS, Math.min(Math.PI - EPS, spherical.phi));
                        spherical.makeSafe();
                        spherical.radius *= scale;
                        spherical.radius = Math.max(scope.minDistance, Math.min(scope.maxDistance, spherical.radius));
                        scope.target.addScaledVector(panOffset, 1);
                        offset.setFromSpherical(spherical);
                        position.copy(scope.target).add(offset);
                        camera.lookAt(scope.target);
                        rotateDelta.set(0, 0);
                        panOffset.set(0, 0, 0);
                        scale = 1;
                    }
                    
                    function onMouseDown(event) {
                        if (!scope.enabled) return;
                        event.preventDefault();
                        if (event.button === 0) { state = STATE.ROTATE; rotateStart.set(event.clientX, event.clientY); }
                        else if (event.button === 2) { state = STATE.PAN; panStart.set(event.clientX, event.clientY); }
                    }
                    
                    function onMouseMove(event) {
                        if (!scope.enabled) return;
                        event.preventDefault();
                        if (state === STATE.ROTATE) {
                            rotateEnd.set(event.clientX, event.clientY);
                            rotateDelta.subVectors(rotateEnd, rotateStart).multiplyScalar(scope.rotateSpeed);
                            rotateStart.copy(rotateEnd);
                            update();
                        } else if (state === STATE.PAN) {
                            panEnd.set(event.clientX, event.clientY);
                            panDelta.subVectors(panEnd, panStart).multiplyScalar(scope.panSpeed);
                            panOffset.copy(new THREE.Vector3(-panDelta.x, panDelta.y, 0).applyMatrix3(new THREE.Matrix3().setFromMatrix4(camera.matrix)));
                            panStart.copy(panEnd);
                            update();
                        }
                        scope.dispatchEvent({type: 'change'});
                    }
                    
                    function onMouseUp(event) {
                        state = STATE.NONE;
                    }
                    
                    function onMouseWheel(event) {
                        if (!scope.enabled) return;
                        event.preventDefault();
                        scale = event.deltaY > 0 ? 1.1 : 0.9;
                        update();
                        scope.dispatchEvent({type: 'change'});
                    }
                    
                    this.update = update;
                    
                    domElement.addEventListener('mousedown', onMouseDown);
                    domElement.addEventListener('mousemove', onMouseMove);
                    domElement.addEventListener('mouseup', onMouseUp);
                    domElement.addEventListener('wheel', onMouseWheel, {passive: false});
                }
            };
        }
    </script>
    
    <script>
        let scene, camera, renderer, controls;
        let meshes = [];
        let wireframeMode = false;
        let meshobjects = [];
        let objgroup = new THREE.Group();
        let clipPlanes = [
            new THREE.Plane(new THREE.Vector3(1, 0, 0), 0),
            new THREE.Plane(new THREE.Vector3(0, 1, 0), 0),
            new THREE.Plane(new THREE.Vector3(0, 0, -1), 0)
        ];
        
        // 调试日志函数
        function debugLog(message) {
            console.log(message);
            const info = document.getElementById('info');
            const p = document.createElement('p');
            p.textContent = message;
            p.style.fontSize = '10px';
            p.style.color = '#ffff00';
            info.appendChild(p);
        }
        
        // STL 文件列表
        const stlFiles = [
            { name: 'FANG FANG_11111111_001.stl', color: 0xff0000 },
            { name: 'FANG FANG_Smoothed_Fuchsia 16_001.stl', color: 0xff00ff },
            { name: 'FANG FANG_Smoothed_Green 16_001.stl', color: 0x00ff00 },
            { name: 'FANG FANG_Smoothed_Green2 16_001.stl', color: 0x00ff88 },
            { name: 'FANG FANG_Smoothed_GreenYellow 16_001.stl', color: 0xadff2f },
            { name: 'FANG FANG_Smoothed_Magenta 16_001.stl', color: 0xff00ff },
            { name: 'FANG FANG_Smoothed_PaleGreen 16_001.stl', color: 0x98fb98 },
            { name: 'FANG FANG_Smoothed_Peach 16_001.stl', color: 0xffdab9 },
            { name: 'FANG FANG_Smoothed_Pink 16_001.stl', color: 0xffc0cb },
            { name: 'FANG FANG_Smoothed_Purple 16_001.stl', color: 0x800080 },
            { name: 'FANG FANG_Smoothed_Red 16_001.stl', color: 0xff0000 },
            { name: 'FANG FANG_Smoothed_SkyBlue 16_001.stl', color: 0x87ceeb },
            { name: 'FANG FANG_Smoothed_Turquiose 16_001.stl', color: 0x40e0d0 },
            { name: 'FANG FANG_Smoothed_Violet 16_001.stl', color: 0xee82ee },
            { name: 'FANG FANG_Smoothed_骶骨 16_001.stl', color: 0xffa500 }
        ];

        function init() {
            debugLog('开始初始化...');
            
            try {
                // 创建场景
                scene = new THREE.Scene();
                debugLog('场景创建成功');
                
                // 添加环境光
                scene.add(new THREE.AmbientLight(0x505050));
                
                // 添加点光源（关键！影响光影效果）
                const pointLight = new THREE.PointLight(0xffffff, 1, 5000);
                pointLight.position.set(500, 500, 500);
                
                // 添加方向光（增强立体感）
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(0, 0, 500);
                scene.add(directionalLight);
                
                // 创建相机
                camera = new THREE.PerspectiveCamera(
                    60,
                    window.innerWidth / window.innerHeight,
                    1,
                    1e10
                );
                camera.add(pointLight);
                scene.add(camera);
                debugLog('相机创建成功');
                
                // 创建渲染器
                renderer = new THREE.WebGLRenderer({
                    antialias: true,
                    alpha: true
                });
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setClearAlpha(0);
                document.body.appendChild(renderer.domElement);
                debugLog('渲染器创建成功');
                
                // 添加控制器
                try {
                    controls = new THREE.OrbitControls(camera, renderer.domElement);
                    controls.rotateSpeed = 0.01;  // 更精细的旋转
                    controls.zoomSpeed = 0.1;
                    controls.panSpeed = 0.5;
                    controls.enableDamping = true;  // 启用阻尼
                    controls.dampingFactor = 0.05;
                    controls.autoRotate = false;
                    debugLog('控制器创建成功');
                } catch(e) {
                    debugLog('控制器创建失败: ' + e.message);
                }
                
                // 窗口大小改变时
                window.addEventListener('resize', onWindowResize, false);
                
                // 加载STL文件
                debugLog('开始加载STL文件...');
                loadSTLFiles();
                
            } catch(e) {
                debugLog('初始化错误: ' + e.message);
                console.error(e);
            }
        }

        function loadSTLFiles() {
            debugLog('STLLoader检查: ' + (typeof THREE.STLLoader));
            
            if (!THREE.STLLoader) {
                debugLog('错误: STLLoader未定义!');
                return;
            }
            
            const loader = new THREE.STLLoader();
            let loadedCount = 0;
            const totalCount = stlFiles.length;
            
            document.getElementById('modelCount').textContent = `模型数量: 0 / ${totalCount}`;
            
            stlFiles.forEach((fileInfo, index) => {
                const filePath = 'STL/' + fileInfo.name;
                debugLog('正在加载: ' + filePath);
                
                loader.load(
                    filePath,
                    function(geometry) {
                        debugLog('加载成功: ' + fileInfo.name);
                        
                        // 创建材质 - 使用MeshPhongMaterial获得更好的光照效果
                        const material = new THREE.MeshPhongMaterial({
                            color: fileInfo.color,
                            side: THREE.DoubleSide,
                            transparent: true,
                            opacity: 0.95,
                            shininess: 100,
                            clippingPlanes: clipPlanes,
                            clipIntersection: false
                        });
                        
                        // 创建网格
                        const mesh = new THREE.Mesh(geometry, material);
                        mesh.name = fileInfo.name;
                        mesh.userData.color = fileInfo.color;
                        
                        // 计算法线
                        geometry.computeVertexNormals();
                        geometry.computeBoundingBox();
                        
                        // 添加到场景
                        scene.add(mesh);
                        objgroup.add(mesh);
                        meshes.push(mesh);
                        meshobjects.push(mesh);
                        
                        // 更新加载进度
                        loadedCount++;
                        document.getElementById('modelCount').textContent = 
                            `模型数量: ${loadedCount} / ${totalCount}`;
                        
                        // 添加到模型列表
                        addModelToList(mesh, index);
                        
                        // 全部加载完成
                        if (loadedCount === totalCount) {
                            onAllModelsLoaded();
                        }
                    },
                    function(xhr) {
                        // 加载进度
                        if (xhr.lengthComputable) {
                            const percentComplete = (xhr.loaded / xhr.total) * 100;
                            debugLog(fileInfo.name + ': ' + percentComplete.toFixed(0) + '%');
                        }
                    },
                    function(error) {
                        debugLog('加载错误: ' + fileInfo.name + ' - ' + error);
                        console.error('加载错误:', fileInfo.name, error);
                        loadedCount++;
                        if (loadedCount === totalCount) {
                            onAllModelsLoaded();
                        }
                    }
                );
            });
        }

        function addModelToList(mesh, index) {
            const modelList = document.getElementById('modelList');
            const item = document.createElement('div');
            item.className = 'model-item';
            item.textContent = mesh.name;
            item.style.borderLeft = `4px solid #${mesh.userData.color.toString(16).padStart(6, '0')}`;
            item.onclick = function() {
                toggleModel(mesh);
                item.classList.toggle('hidden');
            };
            modelList.appendChild(item);
        }

        function onAllModelsLoaded() {
            document.getElementById('loading').style.display = 'none';
            adjustCamera();
            animate();
        }

        function adjustCamera() {
            // 计算所有模型的包围盒
            const box = new THREE.Box3();
            meshes.forEach(mesh => {
                const meshBox = new THREE.Box3().setFromObject(mesh);
                box.union(meshBox);
            });
            
            if (!box.isEmpty()) {
                // 计算中心点和大小
                const center = new THREE.Vector3();
                box.getCenter(center);
                
                const size = new THREE.Vector3();
                box.getSize(size);
                const maxDim = Math.max(size.x, size.y, size.z);
                const fov = camera.fov * (Math.PI / 180); // 将FOV转换为弧度
                let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
                
                // 设置相机位置（使用更好的距离算法）
                controls.target.copy(center);
                camera.position.copy(center);
                camera.position.y += cameraZ * 1.2;  // 增加垂直视角
                camera.up.set(0, 0, 1);
                
                controls.update();
                render();
            }
        }

        function resetCamera() {
            adjustCamera();
            render();
        }

        function toggleModel(mesh) {
            mesh.visible = !mesh.visible;
            render();
        }

        function toggleAllModels() {
            const allVisible = meshes.every(m => m.visible);
            meshes.forEach(mesh => {
                mesh.visible = !allVisible;
            });
            
            const items = document.querySelectorAll('.model-item');
            items.forEach(item => {
                if (allVisible) {
                    item.classList.add('hidden');
                } else {
                    item.classList.remove('hidden');
                }
            });
            
            render();
        }

        function toggleWireframe() {
            wireframeMode = !wireframeMode;
            meshes.forEach(mesh => {
                mesh.material.wireframe = wireframeMode;
            });
            render();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            render();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) {
                controls.update();  // 更新阻尼效果
            }
            render();
        }

        function render() {
            renderer.render(scene, camera);
        }

        // 启动
        init();
    </script>
</body>
</html>
